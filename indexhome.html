<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Work</title>
</head>
<body>
    <h1><center>Student Registration Form</center></h1>
     <form enctype="multipart/form-data">
    <div style="margin: auto; width: 200px;">   
           <table width="50%" border="1" cellspacing="0" cellpadding="13", align="center">
            <tr>
                <td><label for="Student ID">Student ID</label></td> 
                <tb><input type="text" id"student_id" name"student_id"</tb>
                <tr>
                    <td><label for="First Name">First Name</label></td>
                    <td><input type="text" id="first_name" name="first_name" required></td>
                </tr>

        <tr>
            <td><label for="Last Name">Last Name</label></td>
            <td><input type="text" id="last_name" name="last_name" required></td>
        </tr>

        <tr>
            <td><label for="Gender">Gender</label></td>
            <td>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </td>
        </tr>

        <tr>
            <td><label for="Date Of Birth">Date Of Birth</label></td>
            <td><input type="date" id="date_of_birth" name="date_of_birth" required></td>
        </tr>

        <tr>
            <td><label for="Email">Email</label></td>
            <td><input type="email" id="email" name="email" required></td>
        </tr>

        <tr>
            <td><label for="Phone Number">Phone Number</label></td>
            <td><input type="tel" id="phone_number" name="phone_number" required></td>
        </tr>

        <tr>
            <td><label for="Address">Address</label></td>
            <td><input type="text" id="address" name="address" required></td>
        </tr>
        <tr>

            <td><label for="Course">Course</label></td>
            <td>
                <select id="course" name="course" required>
                    <option value="">Select Course</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="JS">JS</option>
                </select>
            </td>
        </tr>

        <tr>
            <td><label for="Photo">Photo</label></td>
            <td><input type="file" id="photo" name="photo" accept="image/*" required></td>
        </tr>
        <tr>

            <td colspan="2" style="text-align: center;">
                <input type="submit" value="Save">
                <input type="reset" value="Reset">
            </td>
        
        </div>
     </form>
</body>
</html>
