<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeWork3</title>
    <link rel="stylesheet" href="homework.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
   </head>
<body>
    <nav class="sidebar">
        <div class="logo-details">
            <i class='bx bxl-c-plus-plus icon-logo'></i>
            <span class="logo_name">CodingLab</span>
        </div>
        <ul class="nav-links">
            <li>
                    <i class='bx bx-grid-alt'></i>
                    <span class="link_name">Dashboard</span>
            </li>
            <li>
                    <i class='bx bx-collection'></i>
                    <span class="link_name">Content</span>
            </li>
            <li>
                    <i class='bx bx-pie-chart-alt-2'></i>
                    <span class="link_name">Analytics</span>
            </li>
            <li>
                    <i class='bx bx-like'></i>
                    <span class="link_name">Like</span>
            </li>
            <li>
                    <i class='bx bx-chat'></i>
                    <span class="link_name">Comment</span>
            </li>
            <li>
                    <i class='bx bx-share-alt'></i>
                    <span class="link_name">Share</span>
            </li>
            
            <li class="bottom-links">
                    <i class='bx bx-log-out'></i>
                    <span class="link_name">Logout</span>
            </li>
            <li class="mode-toggle">
                <div class="dark-light">
                    <i class='bx bx-moon'></i>
                    <span class="link_name">Dark Mode</span>
                </div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider round"></span>
                </label>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-navbar">
            <div class="sidebar-toggle">
                <i class='bx bx-menu'></i>
            </div>
            <div class="search-box">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Search here...">
            </div>
            <div class="profile-details">
                <img src="/Image/profile.webp" alt="Profile">
            </div>
        </header>

        <div class="dashboard-body">
            <div class="section-title">
                <i class='bx bx-tachometer icon-blue'></i>
                <h2>Dashboard</h2>
            </div>

            <section class="cards-container">
                <div class="card blue-card">
                    <i class='bx bx-like card-icon'></i>
                    <span class="card-title">Total Likes</span>
                    <span class="card-number"></span>
                </div>
                <div class="card yellow-card">
                    <i class='bx bx-chat card-icon'></i>
                    <span class="card-title">Comments</span>
                    <span class="card-number"></span>
                </div>
                <div class="card purple-card">
                    <i class='bx bx-share-alt card-icon'></i>
                    <span class="card-title">Total Share</span>
                    <span class="card-number"></span>
                </div>
            </section>

            <section class="recent-activity">
                <div class="section-title">
                    <i class='bx bx-time-five icon-blue'></i>
                    <h2>Recent Activity</h2>
                </div>
                
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Joined</th>
                                <th>Type</th>
                                <th>Status</th>
                            </tr>

                        </thead>
                    </table>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
